kind = "web"
previewPath = "/"
title = "Health Chat Assistant"
version = "1.0.0"
id = "artifacts/health-chat-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19579

[services.development]
run = "pnpm --filter @workspace/health-chat-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-chat-assistant", "run", "build" ]
publicDir = "artifacts/health-chat-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19579"
BASE_PATH = "/"
